name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  release-audit:
    name: Release Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run release audit
        run: bash scripts/release-audit.sh

  build:
    name: TypeScript Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Build
        run: npm run build

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Run tests
        run: npm test

  tools-test:
    name: Tools Package Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install tools workspace
        run: cd tools && npm install
      - name: Typecheck bug-state-machine
        run: cd tools/packages/bug-state-machine && npx tsc --noEmit
      - name: Run bug-state-machine tests
        run: cd tools/packages/bug-state-machine && node --import tsx --test test/**/*.test.ts

  req-coverage:
    name: REQ Coverage Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check REQ frontmatter coverage
        run: bash scripts/check-req-coverage.sh
        # tasks/ 為空時 gracefully pass（初期無任務也 OK）

  prompt-snapshot:
    name: Prompt Snapshot Freshness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Regenerate prompt snapshot
        run: python3 scripts/extract-prompts.py
      - name: Fail if snapshot is stale
        run: |
          if ! git diff --exit-code eval/prompts-snapshot.md; then
            echo "::error::eval/prompts-snapshot.md is stale — run 'python3 scripts/extract-prompts.py' and commit the result"
            exit 1
          fi
