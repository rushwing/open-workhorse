name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  release-audit:
    name: Release Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run release audit
        run: bash scripts/release-audit.sh

  build:
    name: TypeScript Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Build
        run: npm run build

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Run tests
        run: npm test

  req-coverage:
    name: REQ Coverage Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check REQ frontmatter coverage
        run: bash scripts/check-req-coverage.sh
        # tasks/ 為空時 gracefully pass（初期無任務也 OK）
